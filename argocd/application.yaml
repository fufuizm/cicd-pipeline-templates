# ============================================================================
# ArgoCD Application Template
# Copy and customize for each service deployment
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.appName }}
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    team: {{ .Values.team | default "platform" }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.syncWave | default 0 }}"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | default "default" }}

  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision | default "main" }}
    path: {{ .Values.path }}
    helm:
      releaseName: {{ .Values.appName }}
      valueFiles:
        - values.yaml
        - values-{{ .Values.environment }}.yaml

  destination:
    server: {{ .Values.clusterURL | default "https://kubernetes.default.svc" }}
    namespace: {{ .Values.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jqPathExpressions:
        - .spec.metrics[].resource.target
